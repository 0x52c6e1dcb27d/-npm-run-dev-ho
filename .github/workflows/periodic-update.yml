def query_binance_api(endpoint, params=None):
    if params is None: params = {}
    base_url = "https://api.binance.com"
    try:
        query_string = urllib.parse.urlencode(params)
        url = f"{base_url}{endpoint}"
        if query_string: url += f"?{query_string}"
        
        req = urllib.request.Request(url, headers={
            'User-Agent': 'Mozilla/5.0',
            'X-MBX-APIKEY': BINANCE_API_KEY
        })
        # رفع مهلة الانتظار إلى 7 ثوانٍ لتفادي انقطاع الإنترنت في ترمكس
        with urllib.request.urlopen(req, timeout=7) as response:
            return json.loads(response.read().decode())
    except Exception:
        return None

def check_btc_stability():
    res = query_binance_api("/api/v3/klines", {"symbol": "BTCUSDT", "interval": "15m", "limit": 2})
    if res and len(res) >= 2:
        prev_close = float(res[0][4])
        curr_close = float(res[1][4])
        change_pct = ((curr_close - prev_close) / prev_close) * 100
        if change_pct < -2.0:  # حماية مرنة عند الهبوط العنيف جداً فقط
            return False, change_pct
        return True, change_pct
    return True, 0.0

def analyze_advanced_market(symbol):
    res = query_binance_api("/api/v3/klines", {"symbol": symbol, "interval": "5m", "limit": 14})
    ticker_24h = query_binance_api("/api/v3/ticker/24hr", {"symbol": symbol})
    
    if res and len(res) >= 10 and ticker_24h:
        current_candle = res[-1]
        previous_candles = res[:-5]  
        recent_candles = res[-5:-1]   
        
        candle_open_time = datetime.fromtimestamp(current_candle[0] / 1000).strftime("%I:%M %p")
        current_close = float(current_candle[4])
        current_volume = float(current_candle[5])
        
        volume_24h_usdt = float(ticker_24h.get('quoteVolume', 0))
        
        avg_old_vol = sum(float(c[5]) for c in previous_candles) / len(previous_candles)
        avg_recent_vol = sum(float(c[5]) for c in recent_candles) / len(recent_candles)
        
        closes = [float(c[4]) for c in res]
        gains = sum((closes[i] - closes[i-1]) for i in range(1, len(closes)) if (closes[i] - closes[i-1]) > 0)
        losses = sum(abs(closes[i] - closes[i-1]) for i in range(1, len(closes)) if (closes[i] - closes[i-1]) < 0)
        
        rsi = 50  
        if losses > 0:
            rs = gains / losses
            rsi = 100 - (100 / (1 + rs))
            
        highest_prev_close = max(float(c[4]) for c in previous_candles)
        
        return current_close, current_volume, avg_old_vol, avg_recent_vol, candle_open_time, highest_prev_close, volume_24h_usdt, rsi
    return None, None, None, None, None, None, None, None

def get_decimals(price):
    if price >= 100: return 2
    elif price >= 1: return 4
    elif price >= 0.01: return 5
    else: return 7

